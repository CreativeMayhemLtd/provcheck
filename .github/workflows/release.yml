name: Build release binaries

# Fires when a `vX.Y.0` tag is pushed to the private dev repo (the
# trailing `.0` gate skips patch / dev / iteration tags like v0.9.1,
# v0.9.2, etc. — see CONTRIBUTING.md "Release cadence"). Runs the
# build on all three target OSes and uploads the platform archives
# as workflow artefacts, ready for `scripts/publish-release.sh` to
# collect and ship to the public release repo.
#
# The release workflow deliberately does NOT push anything to a public
# repo — that's the maintainer's explicit gesture. See
# `scripts/README.md` and the Milestone 4 notes in `README.md` for
# the reasoning behind the manual-control release flow.
#
# Iteration / patch tags (e.g. v0.9.1 through v0.9.x during the pre-
# v1.0 test-coverage push) deliberately do NOT fire the matrix —
# they exist as commit anchors only. To force a build for a patch
# tag, use the workflow_dispatch input below.

on:
  push:
    tags:
      # Major / minor release tags fire the full matrix.
      # `v*.*.0` is a glob: each `*` matches anything except a slash,
      # so v0.9.0, v0.10.0, v1.0.0 all match while v0.9.1, v0.9.2,
      # v1.0.0-rc1 do NOT.
      - "v*.*.0"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to use in artefact filenames (e.g. v0.9.5)"
        required: true
        default: "v0.0.0-dev"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # cargo-audit gate. Fires once per tag. Fails the matrix on any
  # NEW advisory not in SECURITY.md's tolerated table. Forces an
  # explicit decision: either bump the dep, or add the row to
  # SECURITY.md in the same commit. See
  # feedback_release_prep_gates.md + feedback_tolerated_advisories_watch.md.
  #
  # The --ignore IDs below MUST mirror SECURITY.md exactly. Adding
  # a new tolerated advisory means: update SECURITY.md AND add the
  # ID here in the same commit, with a sentence in the commit body
  # explaining the rationale.
  cargo-audit:
    name: cargo audit (RUSTSEC gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: install cargo-audit
        # 0.22 added CVSS 4.0 parser support — needed for any 2026
        # advisory in the RustSec database.
        run: cargo install cargo-audit --locked --version ^0.22
      - name: run cargo audit against SECURITY.md tolerated set
        run: |
          cargo audit \
            --ignore RUSTSEC-2023-0071 \
            --ignore RUSTSEC-2024-0436 \
            --ignore RUSTSEC-2024-0370 \
            --ignore RUSTSEC-2026-0173 \
            --ignore RUSTSEC-2025-0136 \
            --ignore RUSTSEC-2026-0097

  build:
    name: build (${{ matrix.target }})
    needs: cargo-audit
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            artefact_suffix: windows-x86_64
            bin_ext: .exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            artefact_suffix: linux-x86_64
            bin_ext: ""
          # Intel macOS (x86_64-apple-darwin) is intentionally omitted:
          # GitHub's macos-13 hosted runners queue unpredictably (multi-
          # hour waits as of 2026-Q2) while they wind down Intel fleet
          # capacity. Intel Mac users can run the aarch64 binary under
          # Rosetta or use `cargo install provcheck-cli`. Revisit when
          # GitHub either restores capacity or we self-host.
          - os: macos-14 # aarch64 runner
            target: aarch64-apple-darwin
            archive: tar.gz
            artefact_suffix: macos-aarch64
            bin_ext: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      # Resolve the tag name — either the ref that triggered the build,
      # or the workflow_dispatch input. The archive filenames include
      # it so released downloads are self-identifying.
      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      # Linux native deps:
      #   - libdbus-1-dev: keyring crate's Secret-Service backend
      #   - libpcsclite-dev: yubikey crate's PIV access (v0.5.0+)
      #   - pkg-config: needed by both for their build.rs probes
      # macOS + Windows ship PC/SC and keychain APIs natively;
      # no install needed on those targets.
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev libpcsclite-dev pkg-config

      # v0.7 phase 7b-followup: download the onnxruntime CPU
      # shared library for the target platform. The image-modality
      # detector (provcheck-image / TrustMark) uses ort with
      # load-dynamic, so the binary needs onnxruntime alongside it.
      # Pinned to the version ort 2.0.0-rc.10 was tested against
      # (1.20.x). Bundling means downloaded release archives just
      # work — the user does NOT install onnxruntime separately.
      - name: Download onnxruntime CPU runtime
        shell: bash
        run: |
          ORT_VER=1.20.1
          case "${{ matrix.target }}" in
            x86_64-pc-windows-msvc)
              url="https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VER}/onnxruntime-win-x64-${ORT_VER}.zip"
              dir="onnxruntime-win-x64-${ORT_VER}"
              curl -sSL -o ort.zip "$url"
              7z x ort.zip >/dev/null
              cp "${dir}/lib/onnxruntime.dll" .
              ;;
            x86_64-unknown-linux-gnu)
              url="https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VER}/onnxruntime-linux-x64-${ORT_VER}.tgz"
              dir="onnxruntime-linux-x64-${ORT_VER}"
              curl -sSL "$url" | tar -xz
              cp "${dir}/lib/libonnxruntime.so" .
              cp "${dir}/lib/libonnxruntime.so.${ORT_VER}" . || true
              ;;
            aarch64-apple-darwin)
              url="https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VER}/onnxruntime-osx-arm64-${ORT_VER}.tgz"
              dir="onnxruntime-osx-arm64-${ORT_VER}"
              curl -sSL "$url" | tar -xz
              cp "${dir}/lib/libonnxruntime.${ORT_VER}.dylib" .
              cp "${dir}/lib/libonnxruntime.dylib" . 2>/dev/null || \
                ln -sf "libonnxruntime.${ORT_VER}.dylib" libonnxruntime.dylib
              ;;
          esac
          ls -la *onnxruntime* | head -5

      # Build both CLI binaries in a single cargo invocation so the
      # workspace is compiled once. provcheck (verifier) and
      # provcheck-kit (creator-side toolkit) ship as separate
      # archives so a user grabs only the binary they need —
      # verifiers don't carry the atrium/tokio surface, signers
      # don't carry watermark detectors.
      #
      # `shell: bash` so the line-continuation backslash parses on
      # every OS. Windows defaults to PowerShell, where `\` is an
      # unknown arg and trips before cargo ever starts.
      - name: cargo build --release (provcheck + provcheck-kit)
        shell: bash
        run: |
          cargo build --release --target ${{ matrix.target }} \
            -p provcheck-cli -p provcheck-kit

      # Windows-only: Authenticode-sign the CLI binaries via SSL.com
      # eSigner cloud signing. Skips gracefully when the SSL_COM_*
      # secrets aren't configured on the repo — the release still
      # ships, binaries just come out unsigned (SmartScreen warning
      # returns until the next signed release).
      #
      # Local dev path uses the same sign_release.ps1 script with a
      # signing.json at repo root (gitignored). See
      # docs/release-process.md § code-signing.
      - name: Sign Windows CLI binaries (SSL.com eSigner)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          SSL_COM_USERNAME: ${{ secrets.SSL_COM_USERNAME }}
          SSL_COM_PASSWORD: ${{ secrets.SSL_COM_PASSWORD }}
          SSL_COM_CREDENTIAL_ID: ${{ secrets.SSL_COM_CREDENTIAL_ID }}
          SSL_COM_TOTP_SECRET: ${{ secrets.SSL_COM_TOTP_SECRET }}
        run: |
          if (-not $env:SSL_COM_TOTP_SECRET) {
            Write-Host "SSL_COM_* secrets not set on this repo. Skipping code-signing. Binaries ship UNSIGNED (SmartScreen 'unknown publisher' warning will show on end-user machines). Set the four SSL_COM_* secrets on the dev repo to enable signing on the next release; see docs/release-process.md."
            exit 0
          }
          # Download SSL.com CodeSignTool. The zip nests everything
          # under a CodeSignTool-vX.Y.Z/ subdir; find that subdir and
          # point CODE_SIGN_TOOL_PATH at it.
          $tool_root = "$env:USERPROFILE\CodeSignTool-download"
          New-Item -ItemType Directory -Force -Path $tool_root | Out-Null
          $zip = "$tool_root\CodeSignTool.zip"
          Invoke-WebRequest -Uri "https://www.ssl.com/download/codesigntool-for-windows/" -OutFile $zip -UseBasicParsing
          Expand-Archive -Path $zip -DestinationPath $tool_root -Force
          $inner = Get-ChildItem $tool_root -Directory | Where-Object { $_.Name -like "CodeSignTool*" } | Select-Object -First 1
          $tool_dir = if ($inner) { $inner.FullName } else { $tool_root }
          Write-Host "CodeSignTool at: $tool_dir"
          # Materialise a per-run signing.json from the secrets.
          # Lives in $env:RUNNER_TEMP so it disappears at job end.
          $cfg = @{
            enabled = $true
            username = $env:SSL_COM_USERNAME
            password = $env:SSL_COM_PASSWORD
            credential_id = $env:SSL_COM_CREDENTIAL_ID
            codesigntool_dir = $tool_dir
            totp_secret = $env:SSL_COM_TOTP_SECRET
            verify_after_sign = $false
          }
          $cfg_path = "$env:RUNNER_TEMP\provcheck-signing.json"
          $cfg | ConvertTo-Json | Set-Content -Path $cfg_path -Encoding utf8
          # Sign each Windows CLI exe. sign_release.ps1 exits non-zero
          # on failure — matrix aborts.
          $exes = @(
            "target/${{ matrix.target }}/release/provcheck.exe",
            "target/${{ matrix.target }}/release/provcheck-kit.exe"
          )
          foreach ($exe in $exes) {
            Write-Host "Signing: $exe"
            pwsh -File scripts/sign_release.ps1 -ExePath $exe -ConfigPath $cfg_path
            if ($LASTEXITCODE -ne 0) {
              Write-Error "sign_release.ps1 failed on $exe"
              exit 1
            }
          }
          # Never leave the materialised config on disk past this step.
          Remove-Item -Force $cfg_path

      - name: Stage provcheck archive (${{ matrix.archive }})
        id: stage
        shell: bash
        run: |
          tag="${{ steps.tag.outputs.value }}"
          stage_dir="provcheck-${tag}-${{ matrix.artefact_suffix }}"
          mkdir -p "$stage_dir"
          cp "target/${{ matrix.target }}/release/provcheck${{ matrix.bin_ext }}" "$stage_dir/"
          cp README.md LICENSE "$stage_dir/"
          # v0.7 phase 7b-followup: bundle the onnxruntime CPU
          # shared lib next to the binary so the loader finds it
          # via the standard executable-directory search path.
          case "${{ matrix.target }}" in
            x86_64-pc-windows-msvc)        cp onnxruntime.dll "$stage_dir/" ;;
            x86_64-unknown-linux-gnu)      cp libonnxruntime.so* "$stage_dir/" ;;
            aarch64-apple-darwin)          cp libonnxruntime*.dylib "$stage_dir/" ;;
          esac

          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            archive_name="${stage_dir}.zip"
            # Git Bash on windows-latest ships `zip` — avoids the
            # PowerShell path-quoting quirks Compress-Archive has.
            7z a -tzip "$archive_name" "$stage_dir" >/dev/null
          else
            archive_name="${stage_dir}.tar.gz"
            tar -czf "$archive_name" "$stage_dir"
          fi

          # Produce a sha256 alongside — the README tells users to verify
          # against the site's checksum page, and this is where the
          # authoritative value originates.
          if command -v sha256sum >/dev/null; then
            sha256sum "$archive_name" > "${archive_name}.sha256"
          else
            shasum -a 256 "$archive_name" > "${archive_name}.sha256"
          fi

          echo "archive_name=$archive_name" >> "$GITHUB_OUTPUT"

      - name: Stage provcheck-kit archive (${{ matrix.archive }})
        id: stage_kit
        shell: bash
        run: |
          tag="${{ steps.tag.outputs.value }}"
          stage_dir="provcheck-kit-${tag}-${{ matrix.artefact_suffix }}"
          mkdir -p "$stage_dir"
          cp "target/${{ matrix.target }}/release/provcheck-kit${{ matrix.bin_ext }}" "$stage_dir/"
          cp README.md LICENSE "$stage_dir/"
          # Carry the spec writeup so a creator who installs the
          # kit also has the wire-format reference at hand.
          cp docs/atproto-signing-key.md "$stage_dir/"
          # v0.7 phase 7b-followup: bundle onnxruntime alongside
          # the kit too — `kit watermark --kind image` calls the
          # same ort path.
          case "${{ matrix.target }}" in
            x86_64-pc-windows-msvc)        cp onnxruntime.dll "$stage_dir/" ;;
            x86_64-unknown-linux-gnu)      cp libonnxruntime.so* "$stage_dir/" ;;
            aarch64-apple-darwin)          cp libonnxruntime*.dylib "$stage_dir/" ;;
          esac

          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            archive_name="${stage_dir}.zip"
            7z a -tzip "$archive_name" "$stage_dir" >/dev/null
          else
            archive_name="${stage_dir}.tar.gz"
            tar -czf "$archive_name" "$stage_dir"
          fi

          if command -v sha256sum >/dev/null; then
            sha256sum "$archive_name" > "${archive_name}.sha256"
          else
            shasum -a 256 "$archive_name" > "${archive_name}.sha256"
          fi

          echo "archive_name=$archive_name" >> "$GITHUB_OUTPUT"

      - name: Upload provcheck artefact
        uses: actions/upload-artifact@v4
        with:
          name: provcheck-${{ steps.tag.outputs.value }}-${{ matrix.artefact_suffix }}
          path: |
            ${{ steps.stage.outputs.archive_name }}
            ${{ steps.stage.outputs.archive_name }}.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Upload provcheck-kit artefact
        uses: actions/upload-artifact@v4
        with:
          name: provcheck-kit-${{ steps.tag.outputs.value }}-${{ matrix.artefact_suffix }}
          path: |
            ${{ steps.stage_kit.outputs.archive_name }}
            ${{ steps.stage_kit.outputs.archive_name }}.sha256
          if-no-files-found: error
          retention-days: 30

  # Tauri GUI desktop app. Separate matrix from the CLI because the
  # platform bundle formats are different (installers, not archives)
  # and the Linux build needs distro-specific system packages.
  # Signing status: Windows installers are Authenticode-signed via
  # SSL.com eSigner cloud IF the SSL_COM_* secrets are set on the
  # repo. When unset, the signing step logs a "skipping" note and
  # ships unsigned. macOS bundles are unsigned (no Apple Developer
  # ID yet). Linux has no code-signing convention.
  build-gui:
    name: build-gui (${{ matrix.gui_suffix }})
    needs: cargo-audit
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            gui_suffix: windows-x86_64
            # Windows bundles: NSIS .exe installer + MSI.
            bundle_glob: "app/src-tauri/target/release/bundle/{nsis,msi}/*.{exe,msi}"
          - os: ubuntu-latest
            gui_suffix: linux-x86_64
            # Linux bundles: .deb + .AppImage. rpm omitted (distro-
            # specific) — deb+AppImage cover the common cases.
            bundle_glob: "app/src-tauri/target/release/bundle/{deb,appimage}/*.{deb,AppImage}"
          - os: macos-14
            gui_suffix: macos-aarch64
            # macOS bundle: .dmg (the .app bundle is already inside).
            bundle_glob: "app/src-tauri/target/release/bundle/dmg/*.dmg"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      # Tauri 2 on Linux needs webkit2gtk-4.1 and friends. The list
      # here matches the official Tauri 2 prerequisites page (2026-Q2).
      # libpcsclite-dev added in v0.5.0 for the yubikey crate's PIV
      # backend (the GUI consumes provcheck-sign's Yubikey provider
      # via the new Keys tab).
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libpcsclite-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: npm ci
        working-directory: app
        run: npm ci

      - name: tauri build
        working-directory: app
        run: npm run tauri:build

      # Windows-only: Authenticode-sign the Tauri app's inner exe
      # + every installer (.exe / .msi) via SSL.com eSigner cloud.
      # Same skip-on-missing-secrets posture as the CLI signing step
      # in the build job. See docs/release-process.md § code-signing.
      - name: Sign Windows GUI installers (SSL.com eSigner)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          SSL_COM_USERNAME: ${{ secrets.SSL_COM_USERNAME }}
          SSL_COM_PASSWORD: ${{ secrets.SSL_COM_PASSWORD }}
          SSL_COM_CREDENTIAL_ID: ${{ secrets.SSL_COM_CREDENTIAL_ID }}
          SSL_COM_TOTP_SECRET: ${{ secrets.SSL_COM_TOTP_SECRET }}
        run: |
          if (-not $env:SSL_COM_TOTP_SECRET) {
            Write-Host "SSL_COM_* secrets not set on this repo. Skipping GUI code-signing. Installers ship UNSIGNED (SmartScreen 'unknown publisher' on setup.exe download). Set the four SSL_COM_* secrets on the dev repo to enable signing on the next release."
            exit 0
          }
          # Download SSL.com CodeSignTool (separate runner from the
          # CLI job — has to re-download).
          $tool_root = "$env:USERPROFILE\CodeSignTool-download"
          New-Item -ItemType Directory -Force -Path $tool_root | Out-Null
          $zip = "$tool_root\CodeSignTool.zip"
          Invoke-WebRequest -Uri "https://www.ssl.com/download/codesigntool-for-windows/" -OutFile $zip -UseBasicParsing
          Expand-Archive -Path $zip -DestinationPath $tool_root -Force
          $inner = Get-ChildItem $tool_root -Directory | Where-Object { $_.Name -like "CodeSignTool*" } | Select-Object -First 1
          $tool_dir = if ($inner) { $inner.FullName } else { $tool_root }
          Write-Host "CodeSignTool at: $tool_dir"
          $cfg = @{
            enabled = $true
            username = $env:SSL_COM_USERNAME
            password = $env:SSL_COM_PASSWORD
            credential_id = $env:SSL_COM_CREDENTIAL_ID
            codesigntool_dir = $tool_dir
            totp_secret = $env:SSL_COM_TOTP_SECRET
            verify_after_sign = $false
          }
          $cfg_path = "$env:RUNNER_TEMP\provcheck-signing.json"
          $cfg | ConvertTo-Json | Set-Content -Path $cfg_path -Encoding utf8
          # Sign the inner Tauri exe first — the installers wrap it,
          # so signing the exe before wrap gives users a signed inner
          # binary post-install too. Then sign every installer / MSI
          # the bundler produced.
          $inner_exe = "app/src-tauri/target/release/provcheck-app.exe"
          if (Test-Path $inner_exe) {
            Write-Host "Signing inner exe: $inner_exe"
            pwsh -File scripts/sign_release.ps1 -ExePath $inner_exe -ConfigPath $cfg_path
            if ($LASTEXITCODE -ne 0) { exit 1 }
          }
          $installers = Get-ChildItem "app/src-tauri/target/release/bundle" -Recurse -Include *.exe,*.msi -ErrorAction SilentlyContinue
          foreach ($f in $installers) {
            Write-Host "Signing: $($f.FullName)"
            pwsh -File scripts/sign_release.ps1 -ExePath $f.FullName -ConfigPath $cfg_path
            if ($LASTEXITCODE -ne 0) { exit 1 }
          }
          Remove-Item -Force $cfg_path

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      # Collect whatever bundle files this platform produced, rename
      # to the canonical "provcheck-gui-<tag>-…" form, and emit
      # sha256 sidecars. Upload-artifact's `path` glob handles
      # the rest; we just need the dir contents flat.
      #
      # The rename is the key bit: Tauri's bundler produces names
      # like `provcheck_0.3.2_x64-setup.exe`, which on the GitHub
      # release page sort AFTER everything that starts with
      # `provcheck-` (underscore > hyphen in ASCII) and end up
      # below the "Show all N assets" fold. Renaming so they sort
      # alphabetically with the CLI tarballs puts the installers
      # above the fold where users expect them.
      - name: Stage bundles
        id: stage
        shell: bash
        run: |
          stage_dir="provcheck-gui-${{ steps.tag.outputs.value }}-${{ matrix.gui_suffix }}"
          tag="${{ steps.tag.outputs.value }}"
          # The bundle filenames embed the bare version (no 'v' prefix).
          ver="${tag#v}"
          mkdir -p "$stage_dir"

          # shopt-less glob expansion works everywhere including
          # windows-latest bash.
          shopt -s nullglob globstar || true
          for src in ${{ matrix.bundle_glob }}; do
            base="$(basename "$src")"
            # Strip the leading `provcheck_<X.Y.Z>_` Tauri prefix and
            # replace with `provcheck-gui-<tag>-`. We strip ANY version
            # there, not specifically `${ver}`, so a Tauri-side version
            # drift (app/src-tauri/Cargo.toml + tauri.conf.json +
            # app/package.json out of lockstep with the workspace) can't
            # leak through as an ugly `provcheck-gui-v0.3.4-provcheck-
            # 0.3.2-…` name. Also replace any remaining underscores in
            # the suffix with hyphens so the whole name reads consistently
            # (e.g. `provcheck_0.3.4_x64_en-US.msi` becomes
            # `provcheck-gui-v0.3.4-x64-en-US.msi`).
            suffix="${base#provcheck_}"   # drop literal `provcheck_`
            suffix="${suffix#*_}"          # drop version + trailing underscore
            suffix="${suffix//_/-}"
            dest="provcheck-gui-${tag}-${suffix}"
            cp "$src" "$stage_dir/$dest"
          done

          # Fail fast if the build produced nothing — means the bundle
          # step silently skipped this platform's target.
          if [[ -z "$(ls -A "$stage_dir")" ]]; then
            echo "::error::No GUI bundles produced for ${{ matrix.gui_suffix }}"
            exit 1
          fi

          # sha256 sidecars
          cd "$stage_dir"
          for f in *; do
            if command -v sha256sum >/dev/null; then
              sha256sum "$f" > "${f}.sha256"
            else
              shasum -a 256 "$f" > "${f}.sha256"
            fi
          done
          cd ..

          echo "stage_dir=$stage_dir" >> "$GITHUB_OUTPUT"

      - name: Upload GUI artefact
        uses: actions/upload-artifact@v4
        with:
          name: provcheck-gui-${{ steps.tag.outputs.value }}-${{ matrix.gui_suffix }}
          path: ${{ steps.stage.outputs.stage_dir }}/*
          if-no-files-found: error
          retention-days: 30

  # Software Bill of Materials (SBOM) generation. Produces both
  # CycloneDX 1.6 (OWASP) and SPDX 2.3 (ISO/IEC 5962:2021) for each
  # top-level binary. One SBOM per binary, not per (binary × target):
  # the Cargo.lock-derived dep graph is identical across the three
  # OSes and target-conditional deps appear with `condition`
  # annotations in both formats. Downstream supply-chain tools
  # (Dependency Track, Trivy, Grype, GHAS) resolve target conditions
  # themselves.
  #
  # Runs on a single Linux runner — no need to fan across the matrix.
  # In parallel with the build / build-gui jobs so it doesn't
  # extend the critical path.
  build-sbom:
    needs: cargo-audit
    name: build-sbom
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install cargo-sbom
        run: cargo install cargo-sbom --locked

      - name: Generate SBOMs
        run: ./scripts/generate-sbom.sh "${{ steps.tag.outputs.value }}" sbom-out

      - name: Upload SBOM artefact
        uses: actions/upload-artifact@v4
        with:
          name: provcheck-sbom-${{ steps.tag.outputs.value }}
          path: sbom-out/*
          if-no-files-found: error
          retention-days: 30
