name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs on the same branch — a new push makes the
# old one obsolete.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # fmt + clippy run once on Linux — they're platform-independent and
  # the fastest signal that something's off.
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
      # keyring's Linux backend pulls libdbus-sys, whose build.rs
      # needs libdbus-1-dev + pkg-config. clippy --all-targets
      # invokes the build chain, so without this the lint job
      # dies before clippy even runs.
      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev libpcsclite-dev pkg-config
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # Tests run on every target OS — file format support and path
  # handling differ enough to matter.
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      # See lint job above for why libdbus + pkg-config matter.
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev libpcsclite-dev pkg-config
      - name: cargo test
        run: cargo test --workspace
